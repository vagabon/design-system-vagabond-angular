<dsv-modal
    [id]="id()"
    [titleText]="titleText()"
>
    {{ text() }}
    <div class="modal-footer">
        @if (buttonClose()) {
            <dsv-button
                (callback)="doClickClose()"
                color="error"
            >
                {{ buttonClose()! | translate }}
            </dsv-button>
        }
        <dsv-button
            (callback)="doClick()"
            color="success"
        >
            {{ button() | translate }}
        </dsv-button>
    </div>
</dsv-modal>
