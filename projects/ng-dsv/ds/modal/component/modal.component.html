<div class="modal-overlay" [class.open]="isOpen()"></div>
<div [class]="'modal ' + class()" [class.open]="isOpen()">
  <div class="modal-header">
    <b>{{ titleText() }}</b>
    <dsv-button (callback)="close()" variant="text" color="inherit">
      X
    </dsv-button>
  </div>
  <div class="modal-content">
    <ng-content></ng-content>
  </div>
  <div class="modal-footer">
    <ng-content select="modal-footer"></ng-content>
  </div>
</div>
