@if (show()) {
    <button [class]="classes()" [type]="type()" [disabled]="disabled()" (click)="doClick($event)">
        @if (icon()) {
            <i [class]="icon()"></i>
        }
        @if (libelle()) {
            <span>
                {{ libelle() | translate }}
            </span>
        }
        <span>
            <ng-content></ng-content>
        </span>
        @if (iconEnd()) {
            <i [class]="iconEnd()"></i>
        }
    </button>
}
