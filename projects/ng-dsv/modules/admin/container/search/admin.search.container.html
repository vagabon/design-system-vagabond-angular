<dsv-tabs-component
    [tabs]="tabs()"
    [active]="tab()"
/>
<dsv-card>
    <div class="admin-header">
        <span>Résulat : {{ adminService.datas()[tab()]?.totalElements }}</span>
        <dsv-button
            variant="contained"
            color="primary"
            icon="ri-add-line"
            [routerLink]="'/admin/' + tab() + '/add'"
            [prevent]="false"
        ></dsv-button>
    </div>
    <dsv-form-signal-searchbar
        [search]="adminService.search()[tab()]"
        (callbackSearch)="gotoPage(0, $event)"
    />
    <dsv-table
        [cells]="tabConfig()?.cells!"
        [datas]="adminService.datas()[tab()]?.content!"
        [max]="adminService.tabs().max!"
        [url]="'/admin/' + tab()"
    ></dsv-table>
    <dsv-paginate
        [page]="adminService.page()[this.tabConfig()?.name!]"
        [max]="adminService.datas()[tab()]?.totalPages!"
        (callback)="gotoPage($event)"
    />
</dsv-card>
