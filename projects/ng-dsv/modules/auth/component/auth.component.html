<div class="auth-button">
    <button
        id="google-signin-button"
        [class.hidden]="!authService.loadRefreshToken() || authService.userConnected() !== null"
    ></button>
</div>

@if (authService.userConnected()) {
    <div class="profile">
        <img
            [src]="authService.userConnected()?.avatar"
            alt="profile"
        />
        <dsv-modal-button
            id="logout"
            icon="ri-logout-box-line"
        />
    </div>
    <dsv-modal-alert
        id="logout"
        titleText="Déconnexion"
        text="Voulez-vous vraiment vous déconnecter ?"
        button="Oui"
        buttonClose="Non"
        (callback)="logout()"
    ></dsv-modal-alert>
}
